<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        --radius: 8px;
        --sidebar-width: 400px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          "Noto Sans",
          "Liberation Sans",
          Arial,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: light-dark(#1a1a1a, #e8e8e8);
        background: light-dark(#f5f5f5, #0a0a0a);
        min-height: 100vh;
      }

      /* ── Header (sticky at top) ── */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 20px;
        background: light-dark(#fafafa, #1f1f1f);
        border-bottom: 1px solid light-dark(#e0e0e0, #3a3a3a);
      }

      /* ── Top Navbar tabs (sticky below header) ── */
      .navbar-tabs {
        position: sticky;
        top: 50px;
        z-index: 49;
        display: flex;
        gap: 4px;
        padding: 0 20px;
        background: light-dark(#fafafa, #1f1f1f);
        border-bottom: 1px solid light-dark(#e0e0e0, #3a3a3a);
      }
      .navbar-tabs button {
        all: unset;
        cursor: pointer;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 500;
        color: light-dark(#666, #888);
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition:
          color 120ms,
          border-color 120ms;
      }
      .navbar-tabs button:hover {
        color: light-dark(#222, #ddd);
      }
      .navbar-tabs button[aria-pressed="true"] {
        color: light-dark(#111, #eee);
        border-bottom-color: light-dark(#1d5a96, #95c1e8);
      }
      .navbar-count {
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 9px;
        background: light-dark(#d8e6f1, #1f3a55);
        color: light-dark(#1d5a96, #95c1e8);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      h1 {
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
      }

      .scope {
        color: light-dark(#666666, #888888);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      /* ── Layout toggle ── */
      .layout-toggle {
        display: inline-flex;
        background: light-dark(#f0f0f0, #3a3a3a);
        border: 1px solid light-dark(#d8d8d8, #3a3a3a);
        border-radius: 6px;
        padding: 2px;
        gap: 2px;
      }

      .layout-toggle button {
        all: unset;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        color: light-dark(#666, #888);
        transition: all 120ms;
      }

      .layout-toggle button:hover {
        color: light-dark(#333, #ccc);
      }

      .layout-toggle button[aria-pressed="true"] {
        background: light-dark(#ffffff, #3a3a3a);
        color: light-dark(#111, #eee);
        box-shadow: 0 1px 2px light-dark(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.3));
      }

      .layout-toggle svg {
        flex-shrink: 0;
      }

      /* ── Theme toggle ── */
      .theme-toggle {
        display: inline-flex;
        background: light-dark(#f0f0f0, #3a3a3a);
        border: 1px solid light-dark(#d8d8d8, #3a3a3a);
        border-radius: 6px;
        padding: 2px;
        gap: 2px;
      }

      .theme-toggle button {
        all: unset;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        color: light-dark(#666, #888);
        transition: all 120ms;
      }

      .theme-toggle button:hover {
        color: light-dark(#333, #ccc);
      }

      .theme-toggle button[aria-pressed="true"] {
        background: light-dark(#ffffff, #3a3a3a);
        color: light-dark(#111, #eee);
        box-shadow: 0 1px 2px light-dark(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.3));
      }

      /* ── Layout: panes ── */
      .layout {
        display: block;
      }
      .pane {
        display: flex;
        min-height: calc(100vh - 91px);
      }
      .pane[hidden] {
        display: none;
      }
      .pane-commits,
      .pane-conversation {
        flex-direction: column;
        padding: 32px 0;
      }
      .pane-files {
        align-items: stretch;
      }

      /* ── Left sidebar (sticky below header+navbar) ── */
      .sidebar {
        position: sticky;
        top: 91px;
        width: var(--sidebar-width);
        align-self: stretch;
        flex-shrink: 0;
        overflow-y: auto;
        max-height: calc(100vh - 91px);
        background: light-dark(#fafafa, #252525);
        border-right: 1px solid light-dark(#e0e0e0, #3a3a3a);
        scrollbar-width: thin;
      }

      .sidebar-resizer {
        flex-shrink: 0;
        width: 4px;
        align-self: stretch;
        cursor: col-resize;
        background: transparent;
        position: relative;
        z-index: 2;
      }
      .sidebar-resizer::after {
        content: "";
        position: absolute;
        inset: 0;
        background: light-dark(#e8e8e8, #1e1e1e);
        opacity: 0;
        transition: opacity 100ms;
      }
      .sidebar-resizer:hover::after,
      .sidebar-resizer[data-dragging]::after {
        opacity: 1;
      }

      .sidebar-resizer:focus-visible {
        outline: none;
      }

      .sidebar-header {
        padding: 6px 8px 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: light-dark(#888, #555);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .sidebar-count {
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 9px;
        background: light-dark(#d8e6f1, #1f3a55);
        color: light-dark(#1d5a96, #95c1e8);
        text-transform: none;
        letter-spacing: 0;
      }
      .sidebar-toolbar {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .sidebar-toolbar:empty {
        display: none;
      }
      .sidebar-tabs {
        display: flex;
        border-bottom: 1px solid light-dark(#e0e0e0, #1e1e1e);
        flex-shrink: 0;
      }
      .sidebar-tabs button {
        all: unset;
        flex: 1;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 500;
        text-align: center;
        cursor: pointer;
        color: light-dark(#888, #666);
        border-bottom: 2px solid transparent;
      }
      .sidebar-tabs button[aria-pressed="true"] {
        color: light-dark(#111, #eee);
        border-bottom-color: light-dark(#4a90e2, #4a90e2);
      }
      .sidebar-tabs button:hover:not([aria-pressed="true"]) {
        color: light-dark(#333, #ccc);
      }
      /* ── Commits pane cards ── */
      .commits-list {
        max-width: 720px;
        width: 100%;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      @media (min-width: 1200px) {
        .commits-list {
          max-width: none;
          padding: 0 240px;
        }
      }
      .commit-card {
        border: 1px solid light-dark(#e0e0e0, #222);
        border-radius: var(--radius);
        background: light-dark(#fff, #111);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .commit-card-head {
        padding: 18px 20px;
        background: light-dark(#fafafa, #161616);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .commit-card-head:hover {
        background: light-dark(#f0f0f0, #3a3a3a);
      }
      .commit-card-title {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .commit-card-msg {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.5;
        color: light-dark(#111, #eee);
      }
      .commit-card-meta {
        font-size: 12px;
        color: light-dark(#666, #888);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .commit-sha {
        font-family: "SF Mono", Monaco, Consolas, monospace;
        cursor: pointer;
        padding: 2px 7px;
        border-radius: 3px;
        background: light-dark(#eaeef2, #1e1e1e);
      }
      .commit-sha:hover {
        background: light-dark(#dde3ea, #3a3a3a);
      }
      .commit-card-files {
        display: flex;
        flex-direction: column;
        padding: 0 12px 12px;
      }
      .commit-card-files[data-collapsed] {
        display: none;
      }
      .commit-file-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
      }
      .commit-file-row:hover {
        background: light-dark(#f0f0f0, #3a3a3a);
      }
      .commit-file-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .commit-file-stats {
        display: flex;
        gap: 8px;
        font-size: 12px;
        flex-shrink: 0;
      }
      .commit-file-stats .sa {
        color: light-dark(#1a7f37, #3fb950);
      }
      .commit-file-stats .sd {
        color: light-dark(#cf222e, #f85149);
      }
      .commit-file-jump {
        font-size: 11px;
        padding: 2px 10px;
        border-radius: 4px;
        background: light-dark(#eaeef2, #1e1e1e);
        color: light-dark(#1d5a96, #95c1e8);
        flex-shrink: 0;
      }
      .conversation-list {
        max-width: 720px;
        width: 100%;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      @media (min-width: 1200px) {
        .conversation-list {
          max-width: none;
          padding: 0 240px;
        }
      }
      .pane-toolbar {
        max-width: 720px;
        width: 100%;
        margin: 0 auto 12px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
      }
      @media (min-width: 1200px) {
        .pane-toolbar {
          max-width: none;
          padding: 0 240px 12px;
        }
      }
      .pane-toolbar .sidebar-mode {
        text-transform: none;
        letter-spacing: 0;
      }
      .conversation-item {
        padding: 18px 20px;
        font-size: 13px;
        border: 1px solid light-dark(#e0e0e0, #222);
        border-left: 3px solid light-dark(#4a90e2, #4a90e2);
        border-radius: var(--radius);
        background: light-dark(#fff, #111);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .conversation-item[data-status="resolved"] {
        border-left-color: light-dark(#2ea043, #2ea043);
        opacity: 0.55;
      }
      .conversation-item[data-status="closed_auto"] {
        border-left-color: light-dark(#d29922, #d29922);
      }
      .conversation-item[data-origin="new"] {
        background: light-dark(#eef4fc, #0f1c2e);
      }
      .conversation-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .conversation-head-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
      }
      .conversation-head-right {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }
      .conversation-file {
        font-family: "SF Mono", Monaco, Consolas, monospace;
        font-size: 12px;
        color: light-dark(#1d5a96, #95c1e8);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        cursor: pointer;
        font-weight: 500;
      }
      .conversation-file:hover {
        text-decoration: underline;
      }
      .conversation-status {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 2px 7px;
        border-radius: 3px;
        flex-shrink: 0;
        font-weight: 600;
      }
      .conversation-status[data-status="open"] {
        background: light-dark(#e8f1fb, #1a3a5e);
        color: light-dark(#1a5490, #8ec5ff);
      }
      .conversation-status[data-status="resolved"] {
        background: light-dark(#ddf4e1, #1a4a2a);
        color: light-dark(#1a6e2e, #7ee097);
      }
      .conversation-status[data-status="closed_auto"] {
        background: light-dark(#fdf3dc, #3a2e0e);
        color: light-dark(#7a5510, #d29922);
      }
      .conversation-subhead {
        display: flex;
        gap: 8px;
        font-size: 11px;
        color: light-dark(#888, #666);
        align-items: center;
      }
      .conversation-subhead .badge-new {
        background: light-dark(#4a90e2, #4a90e2);
        color: #fff;
        padding: 1px 6px;
        border-radius: 3px;
        font-weight: 600;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .conversation-body {
        line-height: 1.6;
        word-wrap: break-word;
        white-space: pre-wrap;
      }
      .conversation-actions {
        display: flex;
        gap: 6px;
        padding-top: 4px;
        border-top: 1px solid light-dark(#f0f0f0, #1e1e1e);
      }
      .conversation-actions button {
        all: unset;
        cursor: pointer;
        font-size: 11px;
        padding: 4px 12px;
        border-radius: 4px;
        background: light-dark(#f5f5f5, #3a3a3a);
        color: light-dark(#444, #ccc);
      }
      .conversation-actions button:hover {
        background: light-dark(#e8e8e8, #3a3a3a);
      }
      .conversation-actions button.primary {
        background: light-dark(#1d5a96, #95c1e8);
        color: #fff;
      }
      .conversation-actions button.primary:hover {
        background: light-dark(#154a7a, #6da3d4);
      }
      .conversation-empty {
        padding: 40px 20px;
        text-align: center;
        color: light-dark(#888, #666);
        font-size: 13px;
      }
      .sidebar-mode {
        display: flex;
        gap: 0;
        border: 1px solid light-dark(#d8d8d8, #3a3a3a);
        border-radius: 4px;
        overflow: hidden;
        text-transform: none;
        letter-spacing: 0;
      }
      .sidebar-mode button {
        all: unset;
        cursor: pointer;
        padding: 5px 12px;
        font-size: 12px;
        color: light-dark(#666, #bac2de);
        font-weight: 500;
      }
      .sidebar-mode button[aria-pressed="true"] {
        background: light-dark(#111, #45475a);
        color: light-dark(#fff, #c8c8c8);
      }
      .sidebar-mode button:hover:not([aria-pressed="true"]) {
        background: light-dark(#eeeeee, #3a3a3a);
      }

      .sidebar-list {
        padding: 4px 8px 16px;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .sidebar-item {
        all: unset;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        border-radius: 5px;
        font-size: 12px;
        color: light-dark(#444, #bbb);
        transition: all 100ms;
        min-width: 0;
      }

      .sidebar-item:hover {
        background: light-dark(#eeeeee, #3a3a3a);
        color: light-dark(#111, #eee);
      }

      .sidebar-folder {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px 4px 0;
        font-size: 11px;
        font-weight: 600;
        color: light-dark(#888, #888);
        text-transform: none;
        letter-spacing: 0;
        user-select: none;
      }
      .sidebar-folder .folder-chevron {
        display: inline-block;
        width: 10px;
        text-align: center;
        color: light-dark(#aaa, #666);
        font-size: 10px;
      }
      .sidebar-folder .folder-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sidebar-folder[data-collapsed] .folder-chevron::before {
        content: "▶";
      }
      .sidebar-folder:not([data-collapsed]) .folder-chevron::before {
        content: "▼";
      }
      .sidebar-folder[data-collapsed] + .sidebar-folder-children {
        display: none;
      }
      .sidebar-folder-children {
        display: flex;
        flex-direction: column;
        gap: 1px;
        padding-left: min(8px, calc(var(--depth, 0) * 3px));
        border-left: 1px solid light-dark(#e8e8e8, #3a3a3a);
        margin-left: 4px;
      }
      .sidebar-item.tree {
        padding-left: 8px;
      }
      .sidebar-item .sidebar-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sidebar-item[data-active] {
        background: light-dark(#e8e8e8, #1e1e1e);
        color: light-dark(#111, #eee);
      }

      .sidebar-item[data-read] {
        opacity: 0.55;
      }
      .sidebar-item[data-active] {
        background: light-dark(#e8eef5, #1a2530);
        box-shadow: inset 2px 0 0 0 light-dark(#1d5a96, #95c1e8);
      }
      .sidebar-item-file-comments {
        flex: 0 0 auto;
        font-size: 10px;
        font-weight: 600;
        padding: 0 5px;
        border-radius: 3px;
        background: light-dark(#eaeef2, #1e2a36);
        color: light-dark(#1d5a96, #95c1e8);
        line-height: 16px;
      }
      .sidebar-reviewed {
        flex: 0 0 auto;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 1px 5px;
        border-radius: 4px;
        background: light-dark(#e6f4ea, #1a3a23);
        color: light-dark(#1e6b3a, #7dd8a3);
      }
      .card[data-read] .card-filename {
        color: light-dark(#666, #888);
      }
      .card-reviewed {
        margin-left: 6px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 1px 5px;
        border-radius: 4px;
        background: light-dark(#e6f4ea, #1a3a23);
        color: light-dark(#1e6b3a, #7dd8a3);
      }

      .sidebar-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .sidebar-dot.added {
        background: light-dark(#1a7f37, #3fb950);
      }
      .sidebar-dot.deleted {
        background: light-dark(#cf222e, #f85149);
      }
      .sidebar-dot.modified {
        background: light-dark(#9a6700, #d29922);
      }

      .sidebar-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "SF Mono", Monaco, Consolas, "Ubuntu Mono", monospace;
      }

      .sidebar-stats {
        flex-shrink: 0;
        font-size: 10px;
        font-family: "SF Mono", Monaco, Consolas, "Ubuntu Mono", monospace;
        color: light-dark(#999, #555);
      }

      .sidebar-type-icon {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        color: light-dark(#6e7681, #8b949e);
      }
      .folder-icon {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        color: light-dark(#6e7681, #8b949e);
      }

      .sidebar-stats .sa {
        color: light-dark(#1a7f37, #3fb950);
      }
      .sidebar-stats .sd {
        color: light-dark(#cf222e, #f85149);
      }

      /* ── Main content ── */
      .main {
        flex: 1;
        min-width: 0;
        padding: 16px 16px 80px;
      }

      /* ── Diff cards ── */
      .card {
        border-radius: var(--radius);
        margin-bottom: 12px;
        overflow: hidden;
        border: 1px solid light-dark(#e0e0e0, #222);
        background: light-dark(#fff, #111);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 40px;
        padding: 0 10px;
        cursor: pointer;
        user-select: none;
        background: light-dark(#fafafa, #161616);
        border-bottom: 1px solid light-dark(#e8e8e8, #3a3a3a);
        transition: background 100ms;
        position: sticky;
        top: 91px;
        z-index: 5;
      }

      .card-header:hover {
        background: light-dark(#f0f0f0, #3a3a3a);
      }

      .card[data-collapsed] .card-header {
        border-bottom-color: transparent;
      }

      .card-chevron {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        color: light-dark(#999, #555);
        transition: transform 150ms;
      }

      .card[data-collapsed] .card-chevron {
        transform: rotate(-90deg);
      }

      .card-file-icon {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
        color: light-dark(#666, #888);
      }

      .card-filename {
        flex: 1;
        min-width: 0;
        font-size: 13px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "SF Mono", Monaco, Consolas, "Ubuntu Mono", monospace;
      }

      .card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        font-family: "SF Mono", Monaco, Consolas, "Ubuntu Mono", monospace;
        font-size: 11px;
      }

      .card-status {
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .card-status.added {
        color: light-dark(#1a7f37, #3fb950);
        background: light-dark(#dafbe1, rgba(63, 185, 80, 0.12));
      }

      .card-status.deleted {
        color: light-dark(#cf222e, #f85149);
        background: light-dark(#ffebe9, rgba(248, 81, 73, 0.12));
      }

      .card-status.modified {
        color: light-dark(#9a6700, #d29922);
        background: light-dark(#fff8c5, rgba(210, 153, 34, 0.12));
      }

      .stat-add {
        color: light-dark(#1a7f37, #3fb950);
      }
      .stat-del {
        color: light-dark(#cf222e, #f85149);
      }

      .card-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }

      .file-comments-badge {
        display: inline-flex;
        align-items: center;
        height: 26px;
        padding: 0 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        background: light-dark(#e8e8e8, #3a3a3a);
        color: light-dark(#333, #ccc);
        cursor: default;
        user-select: none;
      }

      .btn-icon {
        all: unset;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 4px;
        color: light-dark(#888, #666);
        transition: all 100ms;
      }

      .btn-icon:hover {
        background: light-dark(#e8e8e8, #3a3a3a);
        color: light-dark(#333, #ccc);
      }

      .btn-icon[data-active] {
        color: light-dark(#1a7f37, #3fb950);
      }

      .card[data-collapsed] .card-body {
        display: none;
      }

      .card-body {
        padding: 0;
      }

      /* ── Review drawer ── */
      .drawer-toggle {
        all: unset;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        background: light-dark(#f0f0f0, #3a3a3a);
        border: 1px solid light-dark(#d8d8d8, #3a3a3a);
        color: light-dark(#333, #ccc);
        transition: all 120ms;
      }

      .drawer-toggle:hover {
        background: light-dark(#e8e8e8, #222);
        border-color: light-dark(#ccc, #383838);
      }
      .drawer-toggle[data-active] {
        background: light-dark(#1d5a96, #4a90e2);
        border-color: light-dark(#1d5a96, #4a90e2);
        color: #fff;
      }
      .drawer-toggle[data-active]:hover {
        background: light-dark(#154a7a, #3a7ec0);
        border-color: light-dark(#154a7a, #3a7ec0);
      }
      .drawer-toggle[data-active] .count {
        background: rgba(255, 255, 255, 0.25);
        color: #fff;
      }

      .drawer-toggle .count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 9px;
        font-size: 10px;
        font-weight: 600;
        background: light-dark(#e0e0e0, #333);
        color: light-dark(#555, #bbb);
      }

      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(400px, 90vw);
        background: light-dark(#fff, #111);
        border-left: 1px solid light-dark(#e0e0e0, #222);
        z-index: 100;
        transform: translateX(100%);
        transition: transform 200ms ease;
        display: flex;
        flex-direction: column;
        box-shadow: -4px 0 24px light-dark(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.4));
      }

      .drawer[data-open] {
        transform: translateX(0);
      }

      .drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid light-dark(#e8e8e8, #222);
        flex-shrink: 0;
      }

      .drawer-header h2 {
        font-size: 14px;
        font-weight: 600;
      }

      .drawer-close {
        all: unset;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 4px;
        color: light-dark(#888, #666);
        transition: all 100ms;
      }

      .drawer-close:hover {
        background: light-dark(#f0f0f0, #3a3a3a);
        color: light-dark(#333, #ccc);
      }

      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .drawer-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 99;
        display: none;
      }

      .drawer-backdrop[data-open] {
        display: block;
      }

      /* ── Form elements ── */
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: light-dark(#666, #888);
        margin-bottom: 4px;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      select,
      textarea {
        width: 100%;
        border: 1px solid light-dark(#ddd, #3a3a3a);
        background: light-dark(#fafafa, #0d0d0d);
        color: inherit;
        border-radius: 6px;
        font: inherit;
        font-size: 13px;
      }

      select {
        height: 32px;
        padding: 0 8px;
      }

      textarea {
        min-height: 72px;
        padding: 8px;
        resize: vertical;
      }

      select:focus,
      textarea:focus {
        outline: none;
        border-color: light-dark(#bbb, #444);
      }

      .btn {
        all: unset;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 32px;
        padding: 0 14px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        transition: all 120ms;
        border: 1px solid light-dark(#ddd, #3a3a3a);
        background: light-dark(#fafafa, #161616);
        color: light-dark(#333, #ccc);
      }

      .btn:hover {
        background: light-dark(#f0f0f0, #1c1c1c);
        border-color: light-dark(#ccc, #383838);
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .btn-primary {
        background: light-dark(#1a1a1a, #e8e8e8);
        color: light-dark(#fff, #111);
        border-color: transparent;
      }

      .btn-primary:hover {
        background: light-dark(#333, #d0d0d0);
      }

      .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      #selection {
        color: light-dark(#888, #666);
        font-size: 12px;
        font-family: "SF Mono", Monaco, Consolas, monospace;
        padding: 6px 8px;
        background: light-dark(#f5f5f5, #0a0a0a);
        border-radius: 4px;
        min-height: 28px;
      }

      /* ── Findings list ── */
      .finding {
        border: 1px solid light-dark(#e0e0e0, #222);
        border-radius: 6px;
        padding: 8px;
        background: light-dark(#fafafa, #161616);
        font-size: 12px;
        cursor: pointer;
        transition: border-color 120ms;
      }

      .finding.file-level {
        border-left: 3px solid light-dark(#4a90e2, #4a90e2);
      }

      .finding:hover {
        border-color: light-dark(#ccc, #383838);
      }

      .finding-head {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 4px;
      }

      .finding-badges {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }

      .badge {
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        background: light-dark(#f0f0f0, #3a3a3a);
        color: light-dark(#666, #888);
        border: 1px solid light-dark(#e0e0e0, #3a3a3a);
      }

      .badge.high {
        color: light-dark(#cf222e, #f85149);
        border-color: light-dark(#ffc8c8, rgba(248, 81, 73, 0.3));
        background: light-dark(#ffebe9, rgba(248, 81, 73, 0.1));
      }

      .badge.medium {
        color: light-dark(#9a6700, #d29922);
        border-color: light-dark(#ffe090, rgba(210, 153, 34, 0.3));
        background: light-dark(#fff8c5, rgba(210, 153, 34, 0.1));
      }

      .badge.low {
        color: light-dark(#1a7f37, #3fb950);
        border-color: light-dark(#b0ecc0, rgba(63, 185, 80, 0.3));
        background: light-dark(#dafbe1, rgba(63, 185, 80, 0.1));
      }

      .finding-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }

      .btn-remove,
      .btn-resolve {
        all: unset;
        cursor: pointer;
        font-size: 11px;
        padding: 1px 8px;
        border-radius: 4px;
        transition: all 100ms;
      }

      .btn-remove {
        color: light-dark(#999, #666);
      }

      .btn-remove:hover {
        color: light-dark(#cf222e, #f85149);
        background: light-dark(#ffebe9, rgba(248, 81, 73, 0.1));
      }

      .btn-resolve {
        color: light-dark(#666, #888);
        border: 1px solid light-dark(#ddd, #3a3a3a);
        background: light-dark(#f5f5f5, #0d0d0d);
      }

      .btn-resolve:hover {
        color: light-dark(#1a7f37, #3fb950);
        border-color: light-dark(#b0ecc0, rgba(63, 185, 80, 0.3));
        background: light-dark(#dafbe1, rgba(63, 185, 80, 0.1));
      }

      .finding-body {
        color: light-dark(#555, #999);
        font-family: "SF Mono", Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
      }

      #status {
        font-size: 12px;
        color: light-dark(#888, #666);
        padding: 4px 0;
      }

      #status.error {
        color: light-dark(#cf222e, #f85149);
      }

      .hint {
        color: light-dark(#aaa, #555);
        font-size: 11px;
        line-height: 1.4;
      }

      .separator {
        height: 1px;
        background: light-dark(#e8e8e8, #222);
      }

      /* ── Diff annotations (inline in diffs) ── */
      .diff-annotation {
        margin: 4px 0;
        border: 1px solid light-dark(#d8e0e8, #2a3040);
        border-radius: 6px;
        background: light-dark(#f0f4f8, #141a24);
        padding: 6px 8px;
        cursor: pointer;
        max-width: min(600px, 95vw);
      }

      .diff-annotation:hover {
        border-color: light-dark(#bbc8d4, #3a4a5a);
      }

      .diff-annotation-head {
        display: flex;
        gap: 4px;
        margin-bottom: 3px;
      }

      .diff-annotation-body {
        font-size: 12px;
        color: light-dark(#444, #bbb);
        white-space: normal;
      }

      .diff-error {
        border: 1px dashed light-dark(#ddd, #333);
        border-radius: 6px;
        padding: 12px;
        color: light-dark(#888, #666);
        font-size: 12px;
      }

      /* ── SVG icons (inline) ── */
      .icon {
        display: inline-block;
        vertical-align: middle;
      }

      /* ── Post-submit overlay ── */
      body.submitted > *:not(.post-submit) {
        opacity: 0.3;
        pointer-events: none;
      }
      .post-submit {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .post-submit-card {
        background: light-dark(#ffffff, #1f1f1f);
        border: 1px solid light-dark(#d8d8d8, #3a3a3a);
        border-radius: 8px;
        padding: 32px 40px;
        max-width: 480px;
        text-align: center;
        box-shadow: 0 4px 16px light-dark(rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.5));
      }
      .post-submit-card h2 {
        margin: 0 0 12px;
        font-size: 18px;
        color: light-dark(#111, #eee);
      }
      .post-submit-card p {
        margin: 0 0 24px;
        color: light-dark(#666, #aaa);
        font-size: 14px;
        line-height: 1.5;
      }
      .post-submit-card kbd {
        display: inline-block;
        padding: 1px 6px;
        border: 1px solid light-dark(#d8d8d8, #3a3a3a);
        border-radius: 3px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        background: light-dark(#f5f5f5, #3a3a3a);
      }

      /* ── Jump highlight (temporary yellow on a diff line) ── */
      @keyframes jump-highlight {
        0% {
          background-color: light-dark(rgba(255, 220, 80, 0.7), rgba(255, 220, 80, 0.45));
        }
        100% {
          background-color: transparent;
        }
      }
      .jump-highlight {
        animation: jump-highlight 2s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>Review Dashboard</h1>
        <span class="scope" id="scope"></span>
      </div>
      <div class="header-right">
        <div class="layout-toggle" id="layout-toggle">
          <button data-layout="unified" aria-pressed="false" title="Unified diff (stacked)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <rect x="2" y="2" width="12" height="5" rx="1" />
              <rect x="2" y="9" width="12" height="5" rx="1" />
            </svg>
            Unified
          </button>
          <button data-layout="split" aria-pressed="true" title="Split diff (side-by-side)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <rect x="1" y="2" width="6" height="12" rx="1" />
              <rect x="9" y="2" width="6" height="12" rx="1" />
            </svg>
            Split
          </button>
        </div>
        <div class="theme-toggle" id="theme-toggle">
          <button data-theme="light" aria-pressed="false">Light</button>
          <button data-theme="auto" aria-pressed="false">Auto</button>
          <button data-theme="dark" aria-pressed="true">Dark</button>
        </div>
        <button class="drawer-toggle" id="drawer-toggle" type="button">
          Review <span class="count" id="finding-count">0</span>
        </button>
      </div>
    </header>

    <nav class="navbar-tabs" id="navbar-tabs">
      <button data-tab="files" aria-pressed="true" title="Files changed">
        Files changed
        <span class="navbar-count" id="files-count" hidden>0</span>
      </button>
      <button data-tab="commits" aria-pressed="false" title="Commits in this review">
        Commits
        <span class="navbar-count" id="commits-count" hidden>0</span>
      </button>
      <button data-tab="conversation" aria-pressed="false" title="Conversation (all findings)">
        Conversation
        <span class="navbar-count" id="conversation-count" hidden>0</span>
      </button>
    </nav>

    <div class="layout">
      <div class="pane pane-files" data-pane="files">
        <nav class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <div class="sidebar-mode" id="sidebar-mode">
              <button data-mode="tree" aria-pressed="true" title="Tree view">Tree</button>
              <button data-mode="flat" aria-pressed="false" title="Flat list">Flat</button>
            </div>
          </div>
          <div class="sidebar-list" id="file-list"></div>
        </nav>
        <div
          class="sidebar-resizer"
          id="sidebar-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize sidebar"
          tabindex="0"
        ></div>
        <div class="main">
          <main id="diffs"></main>
        </div>
      </div>
      <div class="pane pane-commits" data-pane="commits" hidden>
        <div class="commits-list" id="commits-list"></div>
      </div>
      <div class="pane pane-conversation" data-pane="conversation" hidden>
        <div class="pane-toolbar">
          <div class="sidebar-mode" id="conversation-filter">
            <button data-filter="open" aria-pressed="true" title="Show only unresolved">
              Unresolved
            </button>
            <button data-filter="all" aria-pressed="false" title="Show all including resolved">
              All
            </button>
          </div>
        </div>
        <div class="conversation-list" id="conversation-list"></div>
      </div>
    </div>

    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <h2>Review</h2>
        <button class="drawer-close" id="drawer-close" type="button">
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path d="M4 4l8 8M12 4l-8 8" />
          </svg>
        </button>
      </div>
      <div class="drawer-body">
        <div id="selection">Select lines in the diff to start.</div>
        <div class="hint">Click a line number to start, click another to set range.</div>
        <div class="field-row">
          <div>
            <label for="category">Category</label>
            <select id="category"></select>
          </div>
          <div>
            <label for="severity">Severity</label>
            <select id="severity"></select>
          </div>
        </div>
        <div>
          <label for="comment">Comment</label>
          <textarea id="comment" placeholder="What should change and why?"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn" id="clear" type="button">Clear</button>
          <button class="btn btn-primary" id="add" type="button">Add Finding</button>
        </div>

        <div class="separator"></div>

        <div>
          <label for="notes">Notes for this round</label>
          <textarea id="notes" placeholder="Optional global notes"></textarea>
        </div>
        <button class="btn btn-primary" id="submit" type="button" style="width: 100%">
          Submit Review
        </button>

        <div class="separator"></div>

        <div id="findings"></div>
        <div id="status"></div>
      </div>
    </aside>

    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
